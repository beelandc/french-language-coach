name: Cypress E2E Tests

# Run Cypress E2E tests for the conversation flow
# This workflow tests the complete user journey: scenario selection -> chat -> feedback

on:
  push:
    branches:
      - main
      - feature/**
      - test/**
      - fix/**
    paths:
      - 'frontend/**'
      - '.github/workflows/cypress-tests.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/cypress-tests.yml'

jobs:
  cypress-e2e:
    name: Cypress E2E Tests
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        # Run tests on different Node versions
        node-version: [20]
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Fetch all history for git info
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      
      - name: Install Frontend Dependencies
        working-directory: frontend
        run: |
          npm ci
          npm install -g wait-on
      
      - name: Start Vite Dev Server
        working-directory: frontend
        run: |
          # Start the Vite dev server in the background
          npm run dev &
          # Wait for server to be ready
          npx wait-on -t 30000 http://localhost:5173
        env:
          # Disable browser auto-open
          BROWSER: none
      
      - name: Run Cypress Tests
        working-directory: frontend
        run: |
          # Run Cypress tests headlessly
          npx cypress run --browser chrome --spec 'cypress/e2e/conversation-flow.cy.ts'
        env:
          # Configuration for headless testing
          CYPRESS_baseUrl: http://localhost:5173
      
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-results
          path: |
            frontend/cypress/screenshots/
            frontend/cypress/videos/
          retention-days: 7
      
      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-reports
          path: |
            frontend/cypress/results/
          retention-days: 7

  # Additional job for testing on different browsers 
  cypress-browser-matrix:
    name: Cypress Browser Matrix Tests
    runs-on: ubuntu-latest
    needs: cypress-e2e
    #if: github.ref == 'refs/heads/main' #(uncomment to limit to direct pushes to main)
    
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, edge]
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      
      - name: Install Dependencies
        working-directory: frontend
        run: npm ci
      
      - name: Start Vite Dev Server
        working-directory: frontend
        run: |
          npm run dev &
          npx wait-on -t 30000 http://localhost:5173
        env:
          BROWSER: none
      
      - name: Run Cypress on ${{ matrix.browser }}
        working-directory: frontend
        run: |
          npx cypress run --browser ${{ matrix.browser }} --spec 'cypress/e2e/conversation-flow.cy.ts'
