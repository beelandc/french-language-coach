name: Pytest Backend Unit Tests

# Run pytest unit tests for the backend
# This workflow tests the FastAPI backend with pytest + factory-boy

on:
  push:
    branches:
      - main
    paths:
      - 'models/**'
      - 'routers/**'
      - 'services/**'
      - 'tests/**'
      - 'requirements.txt'
      - 'database.py'
      - 'config.py'
      - 'main.py'
      - '.github/workflows/pytest-tests.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'models/**'
      - 'routers/**'
      - 'services/**'
      - 'tests/**'
      - 'requirements.txt'
      - 'database.py'
      - 'config.py'
      - 'main.py'
      - '.github/workflows/pytest-tests.yml'

jobs:
  pytest:
    name: Run Backend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Fetch all history for accurate git info
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: '**/requirements.txt'
      
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run Pytest
        env:
          MISTRAL_API_KEY: dummy_test_key
        run: |
          python3 -m pytest tests/ -v --tb=short
      
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: |
            pytest.xml
            .pytest_cache/
          retention-days: 7

  # All Clear Gateway Job - always runs and checks dependent job statuses
  # This serves as the single required check for branch protection rules
  # instead of requiring all conditional jobs individually.
  # Pattern: https://github.com/beelandc/french-language-coach/issues/190
  status-check:
    name: Status Check Gateway
    runs-on: ubuntu-latest
    needs: [pytest]
    if: always()
    steps:
      - name: Check dependent job results
        run: |
          RESULT="${{ needs.pytest.result }}"
          if [ "$RESULT" = "success" ] || [ "$RESULT" = "skipped" ]; then
            echo "All essential jobs passed or were intentionally skipped."
            exit 0
          else
            echo "One or more required jobs failed."
            exit 1
          fi
