name: Pytest Backend Unit Tests

# Run pytest unit tests for the backend
# This workflow tests the FastAPI backend with pytest + factory-boy

on:
  push:
    branches:
      - main
    paths:
      - 'models/**'
      - 'routers/**'
      - 'services/**'
      - 'tests/**'
      - 'requirements.txt'
      - 'database.py'
      - 'config.py'
      - 'main.py'
      - '.github/workflows/pytest-tests.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'models/**'
      - 'routers/**'
      - 'services/**'
      - 'tests/**'
      - 'requirements.txt'
      - 'database.py'
      - 'config.py'
      - 'main.py'
      - '.github/workflows/pytest-tests.yml'

jobs:
  pytest:
    name: Run Backend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Fetch all history for accurate git info
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: '**/requirements.txt'
      
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run Pytest
        run: |
          python3 -m pytest tests/ -v --tb=short
      
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: |
            pytest.xml
            .pytest_cache/
          retention-days: 7
