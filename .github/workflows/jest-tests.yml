name: Jest Unit Tests

# Run Jest unit tests for the frontend
# This workflow tests React components with jest + @testing-library/react + MSW

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/jest-tests.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/jest-tests.yml'

jobs:
  jest-tests:
    name: Jest Unit Tests
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        # Run tests on different Node versions
        node-version: [20, 22]
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Fetch all history for git info
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      
      - name: Install Frontend Dependencies
        working-directory: frontend
        run: |
          npm ci
      
      - name: Run Jest Tests
        working-directory: frontend
        run: |
          npm run test:jest
      
      - name: Run Jest Tests with Coverage
        working-directory: frontend
        run: |
          npm run test:jest:coverage
        if: matrix.node-version == 20  # Only run coverage on one Node version to save time
      
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-results
          path: |
            frontend/junit.xml
            frontend/test-results/
          retention-days: 7
      
      - name: Upload Coverage Report
        if: always() && matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: jest-coverage
          path: |
            frontend/coverage/
          retention-days: 7

  # All Clear Gateway Job - always runs and checks dependent job statuses
  # This serves as the single required check for branch protection rules
  # instead of requiring all conditional jobs individually.
  # Pattern: https://github.com/beelandc/french-language-coach/issues/190
  status-check:
    name: Status Check Gateway
    runs-on: ubuntu-latest
    needs: [jest-tests]
    if: always()
    steps:
      - name: Check dependent job results
        run: |
          RESULT="${{ needs.jest-tests.result }}"
          if [ "$RESULT" = "success" ] || [ "$RESULT" = "skipped" ]; then
            echo "All essential jobs passed or were intentionally skipped."
            exit 0
          else
            echo "One or more required jobs failed."
            exit 1
          fi
